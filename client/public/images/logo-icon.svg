<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2962ff;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#1e88e5;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#1565c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="iconShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="30" fill="#2962ff" opacity="0.12" filter="url(#iconShadow)"/>
  
  <!-- Main badge -->
  <circle cx="32" cy="32" r="26" fill="url(#iconGradient)" filter="url(#iconShadow)"/>
  
  <!-- Inner highlight rings -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="32" cy="29" r="20" fill="#ffffff" opacity="0.12"/>
  
  <!-- A-Z text with glow -->
  <text x="32" y="42" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3" filter="url(#iconGlow)">A-Z</text>
  
  <!-- Decorative sparkles -->
  <circle cx="20" cy="20" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="44" cy="20" r="1.2" fill="#ffd700" opacity="0.7"/>
  <circle cx="20" cy="44" r="1.2" fill="#ffd700" opacity="0.7"/>
  <circle cx="44" cy="44" r="1.5" fill="#ffd700" opacity="0.7"/>
</svg>
